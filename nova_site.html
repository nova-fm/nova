<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — The future, perfectly packed.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #0d0f14;
    --darker: #080a0e;
    --accent: #c8a96e;
    --accent-light: #e0c98a;
    --text: #f0ede8;
    --muted: #888a90;
    --border: rgba(200,169,110,0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', serif;
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.4rem 4rem;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  nav .logo img { height: 32px; filter: brightness(1.1); }
  nav ul { list-style: none; display: flex; gap: 2.5rem; }
  nav ul a {
    text-decoration: none; color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase;
    transition: color 0.3s;
  }
  nav ul a:hover { color: var(--accent); }

  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    position: relative;
    background: radial-gradient(ellipse at 50% 60%, rgba(200,169,110,0.06) 0%, transparent 70%),
                var(--darker);
  }
  #hero::after {
    content: '';
    position: absolute; bottom: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  #hero img.hero-logo {
    width: 320px; max-width: 80vw;
    margin-bottom: 2rem;
    filter: drop-shadow(0 0 40px rgba(200,169,110,0.15));
  }
  #hero .tagline {
    font-size: 1.1rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); font-family: 'Helvetica Neue', sans-serif; font-weight: 300;
    margin-bottom: 1.5rem;
  }
  #hero p {
    max-width: 520px; color: var(--muted); font-size: 1rem; line-height: 1.9;
    margin-bottom: 3rem;
  }
  .btn {
    display: inline-block;
    padding: 0.85rem 2.5rem;
    border: 1px solid var(--accent);
    color: var(--accent); text-decoration: none;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
    transition: background 0.3s, color 0.3s;
  }
  .btn:hover { background: var(--accent); color: var(--darker); }

  section { padding: 7rem 4rem; }
  .section-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1rem;
  }
  h2 {
    font-size: 2.4rem; font-weight: 400; letter-spacing: 0.04em;
    color: var(--text); margin-bottom: 1.5rem; line-height: 1.3;
  }

  #produit {
    background: var(--dark);
    max-width: 1200px; margin: 0 auto;
  }
  .produit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5rem;
    align-items: center; margin-top: 3rem;
  }
  .produit-visual {
    background: rgba(200,169,110,0.05);
    border: 1px solid var(--border);
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
  }
  .features { display: flex; flex-direction: column; gap: 2rem; }
  .feature {
    display: flex; gap: 1.5rem; align-items: flex-start;
    padding-bottom: 2rem; border-bottom: 1px solid rgba(200,169,110,0.1);
  }
  .feature:last-child { border-bottom: none; padding-bottom: 0; }
  .feature-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .feature h3 {
    font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.4rem;
    font-family: 'Helvetica Neue', sans-serif; font-weight: 400;
  }
  .feature p { color: var(--muted); font-size: 0.9rem; line-height: 1.8; }

  #histoire {
    background: var(--darker);
    text-align: center;
  }
  #histoire .inner { max-width: 700px; margin: 0 auto; }
  #histoire p { color: var(--muted); line-height: 2; margin-bottom: 1.2rem; font-size: 1rem; }
  .quote {
    font-size: 1.25rem; font-style: italic; color: var(--accent-light);
    line-height: 1.8; margin: 3rem 0;
    border-left: 1px solid var(--accent);
    padding-left: 2rem; text-align: left;
  }

  #specs {
    background: var(--dark);
    max-width: 1200px; margin: 0 auto;
  }
  .specs-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--border); margin-top: 3rem;
  }
  .spec-card {
    background: var(--dark);
    padding: 2.5rem 2rem; text-align: center;
  }
  .spec-card .num {
    font-size: 2.5rem; color: var(--accent); font-weight: 300;
    letter-spacing: 0.05em; margin-bottom: 0.5rem;
  }
  .spec-card .spec-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
  }

  #contact {
    background: var(--darker);
    text-align: center;
  }
  #contact .inner { max-width: 600px; margin: 0 auto; }
  #contact p { color: var(--muted); margin-bottom: 2.5rem; line-height: 1.9; }
  .contact-info {
    display: flex; flex-direction: column; gap: 1.2rem;
    margin: 2.5rem 0;
  }
  .contact-row {
    display: flex; justify-content: center; align-items: center; gap: 1rem;
    font-family: 'Helvetica Neue', sans-serif; font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .contact-row .clabel { color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; font-size: 0.7rem; }
  .contact-row .cval { color: var(--text); }

  footer {
    padding: 2.5rem 4rem;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted);
  }
  footer img { height: 20px; opacity: 0.5; }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    nav ul { gap: 1.5rem; }
    section { padding: 5rem 1.5rem; }
    .produit-grid { grid-template-columns: 1fr; gap: 3rem; }
    .specs-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
